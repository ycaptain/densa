name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - "CHANGELOG.md"
      - ".github/SECURITY.md"
      - ".github/CONTRIBUTING.md"
      - ".github/CODE_OF_CONDUCT.md"
      - ".editorconfig"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - "CHANGELOG.md"
      - ".github/SECURITY.md"
      - ".github/CONTRIBUTING.md"
      - ".github/CODE_OF_CONDUCT.md"
      - ".editorconfig"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"

# Two jobs, one workflow:
# - `validate` runs the densa AGENTS001-012 rules on every change
#   (file + staged + PR-diff scope). This is the gate every PR must clear.
# - `tests` runs pytest/ruff/mypy across the Python matrix. Only kicks in
#   when the validator code, templates, prompts, or schema changes —
#   `domains/<X>/wiki/` edits do not need to retest the validator.
jobs:
  validate:
    name: schema + wikilink check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `densa --diff` can resolve the PR base.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install densa (strict extras)
        run: pip install -e ".[strict]"
      - name: Run densa over the full repo (file rules)
        # Local equivalent: `DENSA_STRICT=1 PYTHONPATH=_system python -m densa --all`.
        # The CI step adds `--format=github` for PR annotations; otherwise
        # identical.
        run: DENSA_STRICT=1 densa --all --format=github
      - name: Run densa over the PR range (staged rules)
        # Local equivalent: `DENSA_STRICT=1 PYTHONPATH=_system python -m densa --diff <base-ref>`.
        # CI hard-codes the PR base ref via the event payload and adds
        # GitHub-Actions PR annotations.
        if: github.event_name == 'pull_request'
        run: |
          DENSA_STRICT=1 densa --diff \
            "origin/${{ github.event.pull_request.base.ref }}" \
            --format=github

  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      # The four canonical local commands (see CONTRIBUTING.md
      # §"Before submitting a PR") run as four explicit CI steps so each
      # gate's failure surfaces in its own annotation; the local
      # contributor flow is `python -m X` verbatim with no task runner
      # in between.
      - name: lint — densa --all (schema + wikilink)
        run: PYTHONPATH=_system python -m densa --all
      - name: test — pytest
        run: python -m pytest
      - name: ruff — lint validator code
        run: python -m ruff check .
      - name: mypy — strict type check
        run: python -m mypy
