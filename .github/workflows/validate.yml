name: validate

on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
      - ".editorconfig"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
      - ".editorconfig"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"

jobs:
  schema:
    name: schema + wikilink check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install wikilint (strict extras)
        run: pip install -e ".[strict]"
      - name: Run wikilint
        run: wikilint --all --format=github
