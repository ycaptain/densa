# Pre-commit framework manifest for the `densa` hook.
#
# Users adopt this in their own vault's `.pre-commit-config.yaml`:
#
#   repos:
#     - repo: https://github.com/ycaptain/densa
#       rev: v0.1.0
#       hooks:
#         - id: densa
#
# The local hook in `_system/hooks/pre-commit` covers users who prefer
# not to install the pre-commit framework. Both call into the same
# `python -m densa --staged` entry point.

- id: densa
  name: densa (schema + wikilink check)
  description: Validate a Densa vault against AGENTS.md's "Frontmatter schema" + "Red lines" sections.
  entry: python -m densa --staged
  language: python
  pass_filenames: false
  always_run: true
  types: [text]
